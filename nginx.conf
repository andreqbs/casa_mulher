server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para Flora API — token injetado server-side via envsubst no startup.
    # FLORA_API_TOKEN é passado como variável de ambiente no docker-compose.yml.
    location /flora-api/ {
        proxy_pass https://flora3.hooy.com.br/api/v1/;
        proxy_ssl_server_name on;
        proxy_set_header Host flora3.hooy.com.br;
        proxy_set_header Authorization "Bearer ${FLORA_API_TOKEN}";
        proxy_set_header Content-Type "application/json";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "POST, GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Proxy para OpenAI Chat Completions — API key injetada server-side via envsubst.
    location /openai-api/ {
        proxy_pass https://api.openai.com/v1/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.openai.com;
        proxy_set_header Authorization "Bearer ${CHATKIT_OPENAI_API_KEY}";
        proxy_set_header Content-Type "application/json";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "POST, GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Proxy para ChatKit Sessions (Agent Builder) — API key injetada server-side via envsubst.
    location /chatkit-api/ {
        proxy_pass https://api.openai.com/v1/chatkit/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.openai.com;
        proxy_set_header Authorization "Bearer ${CHATKIT_OPENAI_API_KEY}";
        proxy_set_header OpenAI-Beta "chatkit_beta=v1";
        proxy_set_header Content-Type "application/json";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "POST, GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
